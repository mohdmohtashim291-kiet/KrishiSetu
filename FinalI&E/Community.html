<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Community</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f4fbf5;
  color:#0b4d1f;
}

/* HEADER */

.header{
  text-align:center;
  padding:60px 20px 30px;
}

.header h1{
  font-size:2.8rem;
}

.header p{
  color:#4c6f5a;
  margin-top:10px;
}

/* SEARCH */

.search-box{
  max-width:500px;
  margin:20px auto;
  display:flex;
  background:white;
  border-radius:50px;
  overflow:hidden;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.search-box input{
  flex:1;
  padding:15px;
  border:none;
  outline:none;
}

.search-box button{
  padding:15px 20px;
  border:none;
  background:#18c654;
  color:white;
  cursor:pointer;
}

/* GRID */

.grid{
  padding:40px 8%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

/* CARD */

.card{
  background:white;
  border-radius:20px;
  padding:25px;
  text-align:center;
  border:1px solid #dce8da;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px);
  box-shadow:0 15px 30px rgba(0,0,0,0.08);
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
}

.card h3{
  margin-bottom:5px;
}

.location{
  font-size:0.9rem;
  color:#567562;
  margin-bottom:10px;
}

.crop{
  font-size:0.95rem;
  margin-bottom:15px;
}

.rating{
  color:#18c654;
  margin-bottom:15px;
}

/* BUTTON */

.btn{
  padding:10px 18px;
  border:none;
  border-radius:12px;
  background:#18c654;
  color:white;
  cursor:pointer;
}

/* MODAL */

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:0.3s;
}

.modal.active{
  opacity:1;
  pointer-events:auto;
}

.chat-box{
  background:white;
  width:90%;
  max-width:400px;
  border-radius:20px;
  overflow:hidden;
}

.chat-header{
  background:#18c654;
  color:white;
  padding:15px;
}

.chat-body{
  height:250px;
  padding:15px;
  overflow-y:auto;
}

.chat-input{
  display:flex;
  border-top:1px solid #ddd;
}

.chat-input input{
  flex:1;
  padding:10px;
  border:none;
}

.chat-input button{
  padding:10px;
  border:none;
  background:#18c654;
  color:white;
}

</style>
</head>

<body>

<div class="header">
  <h1>Farmer Community 🤝</h1>
  <p>Connect, share, and grow together</p>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="Search farmers...">
  <button onclick="searchFarmer()"><i class="fa fa-search"></i></button>
</div>

<div class="grid" id="grid">

  <!-- CARD -->
  <div class="card">
    <img src="https://randomuser.me/api/portraits/men/32.jpg">
    <h3>Ramesh Kumar</h3>
    <div class="location">📍 UP</div>
    <div class="crop">🌾 Wheat Farmer</div>
    <div class="rating">★★★★★</div>
    <button class="btn" onclick="openChat('Ramesh Kumar')">Message</button>
  </div>

  <div class="card">
    <img src="https://randomuser.me/api/portraits/women/44.jpg">
    <h3>Sunita Devi</h3>
    <div class="location">📍 Bihar</div>
    <div class="crop">🌱 Rice Farmer</div>
    <div class="rating">★★★★★</div>
    <button class="btn" onclick="openChat('Sunita Devi')">Message</button>
  </div>

  <div class="card">
    <img src="https://randomuser.me/api/portraits/men/76.jpg">
    <h3>Arjun Singh</h3>
    <div class="location">📍 Punjab</div>
    <div class="crop">🌽 Corn Farmer</div>
    <div class="rating">★★★★☆</div>
    <button class="btn" onclick="openChat('Arjun Singh')">Message</button>
  </div>

</div>

<!-- CHAT MODAL -->

<div class="modal" id="modal">
  <div class="chat-box">

    <div class="chat-header" id="chatTitle">Chat</div>

    <div class="chat-body" id="chatBody">
      <div>Hello! 👋</div>
    </div>

    <div class="chat-input">
      <input type="text" id="msg">
      <button onclick="sendMsg()">Send</button>
    </div>

  </div>
</div>

<script>

// OPEN CHAT
function openChat(name){
  document.getElementById("modal").classList.add("active");
  document.getElementById("chatTitle").innerText = name;
}

// SEND MESSAGE
function sendMsg(){
  let input = document.getElementById("msg");
  let text = input.value;
  if(text==="") return;

  let div = document.createElement("div");
  div.innerText = "You: " + text;
  document.getElementById("chatBody").appendChild(div);

  input.value="";
}

// CLOSE
window.onclick = function(e){
  if(e.target.id==="modal"){
    document.getElementById("modal").classList.remove("active");
  }
}

// SEARCH
function searchFarmer(){
  let val = document.getElementById("search").value.toLowerCase();
  let cards = document.querySelectorAll(".card");

  cards.forEach(card=>{
    let name = card.innerText.toLowerCase();
    card.style.display = name.includes(val) ? "block" : "none";
  });
}

</script>

</body>
</html>
